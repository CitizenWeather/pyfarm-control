version: "3.8"

services:
  pyfarm-control:
    build: .
    container_name: pyfarm-control
    ports:
      - "8765:8765"
    volumes:
      - ./grow.yaml:/etc/pyfarm/grow.yaml:ro
      - pyfarm-data:/var/lib/pyfarm
      - /dev:/dev  # Required for GPIO access on RPi host
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
    command: pyfarm grow start /etc/pyfarm/grow.yaml --api-port 8765 --db /var/lib/pyfarm/pyfarm.db
    restart: unless-stopped
    privileged: true  # Required for GPIO access

volumes:
  pyfarm-data:
    driver: local
